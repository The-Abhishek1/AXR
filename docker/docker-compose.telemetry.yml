version: '3.8'
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: axr-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
      - COLLECTOR_OTLP_HTTP_HOST_PORT=0.0.0.0:4318
  
  prometheus:
    image: prom/prometheus:latest
    container_name: axr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro  # Fixed path
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'