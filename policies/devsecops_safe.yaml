# Security policies for AXR execution runtime
# This file controls what syscalls are allowed, denied, and their budget limits

allowed_syscalls:
  # Version Control
  - git.clone           # Clone git repositories
  
  # Security Scanning
             # Static application security testing
  - dependency.check    # Check for vulnerable dependencies
  
  # Code Quality
  - lint                # Lint source code for style issues
  
  # Build & Test
  - build               # Build application artifacts
  - test.run            # Run unit/integration tests
  
  # Deployment
  - deploy.service      # Deploy to environments

denied_syscalls:
  # Explicitly deny dangerous operations
  - git.push            # Prevent unauthorized pushes
  - rm -rf              # Prevent destructive file operations
  - sudo                # Prevent privilege escalation
  - chmod 777          # Prevent permission changes
  - curl external  
  - sast.scan     # Block unauthorized external calls (use tools instead)
  
  # Potentially dangerous tools (uncomment if needed)
  # - docker.run         # Container execution (enable with caution)
  # - kubectl.delete     # Kubernetes deletion (admin only)

budget_limits:
  max_per_process: 100  # Maximum budget units per process
  
  # Per-tool budget costs
  per_syscall:
    git.clone: 5         # Cloning repos costs 5 units
    sast.scan: 15        # Deep security scanning costs more
    dependency.check: 8  # Dependency checking is moderate
    lint: 3              # Linting is cheap
    build: 10            # Building costs moderate
    test.run: 8          # Testing costs moderate
    deploy.service: 20   # Deployment is expensive

# Security levels for different environments
environments:
  development:
    allowed_syscalls: "*"  # All tools allowed in dev
    budget_multiplier: 2.0  # Double budget in dev
    
  staging:
    allowed_syscalls: "*"   # All tools allowed in staging
    budget_multiplier: 1.5  # 1.5x budget in staging
    
  production:
    allowed_syscalls:
      - git.clone
      - build
      - test.run
      - deploy.service
    denied_syscalls:
      - sast.scan           # Maybe run scans in staging only
      - dependency.check    # Run dependency checks in staging
    budget_multiplier: 1.0  # Normal budget in production

# Rate limiting per tool (calls per minute)
rate_limits:
  git.clone: 10
  sast.scan: 5
  dependency.check: 10
  lint: 30
  build: 10
  test.run: 20
  deploy.service: 5

# Timeout limits per tool (seconds)
timeouts:
  git.clone: 300      # 5 minutes
  sast.scan: 600      # 10 minutes
  dependency.check: 180 # 3 minutes
  lint: 120           # 2 minutes
  build: 600          # 10 minutes
  test.run: 300       # 5 minutes
  deploy.service: 300 # 5 minutes

# Resource limits per tool
resource_limits:
  git.clone:
    memory_mb: 512
    cpu_cores: 1
  sast.scan:
    memory_mb: 2048
    cpu_cores: 2
  dependency.check:
    memory_mb: 1024
    cpu_cores: 1
  lint:
    memory_mb: 512
    cpu_cores: 1
  build:
    memory_mb: 4096
    cpu_cores: 4
  test.run:
    memory_mb: 2048
    cpu_cores: 2
  deploy.service:
    memory_mb: 1024
    cpu_cores: 1

# Security policies
security:
  # Tools that require additional authentication
  require_auth:
    - deploy.service
    - build
  
  # Tools that require approval for production
  require_approval:
    - deploy.service
  
  # Tools that create audit logs
  audit_log:
    - deploy.service
    - build
    - sast.scan

# Failure policies per tool
failure_policies:
  git.clone: "retry"        # Retry on failure
  sast.scan: "skip"         # Skip if fails (non-critical)
  dependency.check: "skip"  # Skip if fails
  lint: "skip"              # Skip if fails
  build: "retry"            # Retry on failure
  test.run: "fail"          # Fail process if tests fail
  deploy.service: "fail"    # Fail process if deploy fails

# Success criteria for each tool
success_criteria:
  sast.scan:
    max_critical: 0         # No critical vulnerabilities allowed
    max_high: 5             # Max 5 high vulnerabilities
  test.run:
    min_coverage: 80        # Minimum 80% test coverage
    max_failures: 0         # No test failures allowed
  dependency.check:
    max_critical: 0         # No critical vulnerabilities in deps